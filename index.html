    body {

    .sidebar {
      width: 250px;
      background: #f4f4f4;
      padding: 20px;
      height: 100vh;
    }

    .sidebar img {
      width: 100%;
      border-radius: 10px;
    }

    .content {
      flex: 1;
      padding: 40px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .card {
      perspective: 1000px;
    }


  .card-inner {
    position: relative;
    width: 100%;
    height: 200px;
    transform-style: preserve-3d;
    transition: transform 0.6s;
    }

    .card:hover .card-inner {
      transform: rotateY(180deg);
    }


  .card-front, .card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    backface-visibility: hidden;
    border: 1px solid #ccc;
    padding: 0;
    }


.card-front img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

    .card-back {
      background: white;
      transform: rotateY(180deg);
    }
  </style>
</head>
