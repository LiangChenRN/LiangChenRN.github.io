<!DOCTYPE html>
<html>
<head>
  <title>Liang Chen</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
    }

    /* LEFT SIDE */
    .sidebar {
      width: 250px;
      background: #f4f4f4;
      padding: 20px;
      height: 100vh;
    }

    .sidebar img {
      width: 100%;
      border-radius: 10px;
    }

    /* RIGHT SIDE */
    .content {
      flex: 1;
      padding: 40px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    /* CARD */
    .card {
      perspective: 1000px;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 200px;
      transform-style: preserve-3d;
      transition: transform 0.6s;
    }

    .card:hover .card-inner {
      transform: rotateY(180deg);
    }

    .card-front, .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border: 1px solid #ccc;
      padding: 10px;
    }

    .card-front {
      background: #ddd;
    }

    .card-back {
      background: white;
      transform: rotateY(180deg);
    }
  </style>
</head>

</body>
</html>
